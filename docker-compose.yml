services:
  asistente-ia:
    build: .
    container_name: bot_asistente
    restart: unless-stopped # 🔹 Mejor que 'always' para desarrollo
    stdin_open: true
    tty: true
    volumes:
      - .:/app # Código y config
      - whisper-cache:/app/whisper_models # 🔹 Persiste modelo Whisper
      - "C:/Users/Robert/OneDrive/Documentos:/app/documentos"
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Madrid # 🔹 Zona horaria para logs y calendar
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # 🔹 Healthcheck para monitoreo
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f bot_asistente.py || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  whisper-cache: # 🔹 Evita redescargar el modelo en cada rebuild
