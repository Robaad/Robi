services:
  asistente-ia:
    build: .
    container_name: bot_asistente
    restart: unless-stopped
    stdin_open: true
    tty: true
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - whisper-cache:/app/whisper_models
      - ${DOCUMENTOS_PATH:-./documentos}:/app/documentos
      - bot_ssh:/root/.ssh
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Madrid
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f bot_asistente.py || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  whisper-cache:
  bot_ssh:
